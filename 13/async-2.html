<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비동기 처리 방식</title>
</head>
<body>

  <script>
    function displayA() {
      console.log("A");
    }
    function displayB(callback) {
      setTimeout(() => {
        console.log("B");
        callback();
      }, 2000);
    }
    function displayC() {
      console.log("C");
    }    
    displayA();
    displayB(displayC);
  </script>
</body>
</html>

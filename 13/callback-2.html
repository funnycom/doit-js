<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비동기 프로그래밍 - callback</title>
</head>
<body>
  <script>
    function displayLetter() {
      console.log("A");
      setTimeout( () => {
        console.log("B");
        setTimeout( () => {
          console.log("C");
          setTimeout( () => {
            console.log("D");
            setTimeout( () => {
              console.log("stop!");
            }, 1000);
          }, 1000);
        },1000);
      }, 1000);
    }   
    
    displayLetter();
  </script>
</body>
</html>
